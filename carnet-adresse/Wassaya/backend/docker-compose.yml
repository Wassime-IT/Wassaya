services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wassaya
      POSTGRES_USER: wassaya
      POSTGRES_PASSWORD: wassaya
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # optionnel (accès depuis Windows). Change si conflit.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wassaya -d wassaya"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8026:8025"   # UI mailpit sur Windows
      - "1026:1025"   # SMTP mailpit sur Windows
    volumes:
      - mailpit-data:/data
    environment:
      - MP_DATABASE=/data/mailpit.db
    restart: unless-stopped

  web:
    build: .
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    env_file:
      - .env.docker
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  mailpit-data:
# --- End of file backend/docker-compose.yml ---
