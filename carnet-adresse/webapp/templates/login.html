{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Connexion</h2>
  <p class="muted">Connexion pour super-admin, admin ou contact.</p>
  <form method="post" class="grid">
    <div>
      <label>Email</label>
      <input name="email" type="email" required>
    </div>
    <div>
      <label>Mot de passe</label>
      <input name="password" type="password" required>
    </div>
    <div class="row" style="grid-column:1/-1;">
      <button type="submit">Se connecter</button>
      <a class="btn secondary" href="{{ url_for('register') }}">Créer un compte (contact)</a>
      <a class="btn secondary" href="{{ url_for('setup') }}">Créer le 1er super-admin</a>
    </div>
  </form>
</div>
{% endblock %}
