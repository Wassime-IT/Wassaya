{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Changer le mot de passe</h2>
  <form method="post" class="grid">
    <div><label>Mot de passe actuel</label><input name="current_password" type="password" required></div>
    <div><label>Nouveau mot de passe</label><input name="new_password" type="password" required></div>
    <div class="row" style="grid-column:1/-1;">
      <button type="submit">Modifier</button>
      <a class="btn secondary" href="{{ url_for('dashboard') }}">Retour</a>
    </div>
  </form>
</div>
{% endblock %}
