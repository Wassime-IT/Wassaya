{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Créer un admin</h2>
  <form method="post" class="grid">
    <div><label>Nom</label><input name="last_name" required></div>
    <div><label>Prénom</label><input name="first_name" required></div>
    <div><label>Email</label><input name="email" type="email" required></div>
    <div><label>Téléphone</label><input name="phone" required></div>
    <div><label>Mot de passe</label><input name="password" type="password" required></div>
    <div>
      <label>Rôle</label>
      <select name="role">
        <option value="admin" selected>admin</option>
        <option value="superadmin">superadmin</option>
      </select>
    </div>
    <div class="row" style="grid-column:1/-1;">
      <button type="submit">Créer</button>
      <a class="btn secondary" href="{{ url_for('superadmin_panel') }}">Retour</a>
    </div>
  </form>
</div>
{% endblock %}
