{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Réserver un rendez-vous</h2>
  <form method="post" class="grid">
    <div>
      <label>Date/Heure</label>
      <input name="scheduled_at" type="datetime-local" required>
      <div class="muted">Choisis une date/heure (format navigateur).</div>
    </div>
    <div>
      <label>Note (optionnel)</label>
      <textarea name="note" rows="3" placeholder="Motif, information..."></textarea>
    </div>
    <div class="row" style="grid-column:1/-1;">
      <button type="submit">Valider</button>
      <a class="btn secondary" href="{{ url_for('contact_panel') }}">Retour</a>
    </div>
  </form>
</div>
{% endblock %}
